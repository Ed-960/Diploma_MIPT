<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Архитектура LLM / RAG</title>
  <style>
    :root {
      --blue-soft: #c5daf0;
      --blue-mid: #8eb4d9;
      --blue-deep: #3d6fa8;
      --line: #3d6fa8;
      --line-glow: #a8c8e8;
      --line-dim: #7b9bc4;
      --blue-header: #e8f2fb;
      --white: #ffffff;
      --border: #9bb5d0;
      --text: #1a2d3d;
      --muted: #5a6f82;
      --accent: #e8943a;
      --shadow: 0 4px 18px rgba(61, 111, 168, 0.14);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 14px 12px 20px;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #fff;
      color: var(--text);
    }

    h1 {
      text-align: center;
      font-weight: 600;
      font-size: 1.32rem;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
      color: var(--blue-deep);
    }
    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 16px;
    }

    .panel {
      max-width: 920px;
      margin: 0 auto 14px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(61, 111, 168, 0.08);
      overflow: hidden;
    }

    .panel-body {
      padding: 6px 4px 10px;
      background: #fff;
    }

    .diagram {
      display: block;
      width: 100%;
      height: auto;
    }

    .diagram text {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      user-select: none;
    }

  </style>
</head>
<body>
  <h1>Архитектура ответа кассира</h1>
  <p class="subtitle">Линии связи · базовая LLM · Vector RAG · Graph RAG · генерация датасета</p>

  <!-- 1. Базовая -->
  <section class="panel">
    <div class="panel-body">
      <svg class="diagram" viewBox="0 0 676 128" xmlns="http://www.w3.org/2000/svg" aria-label="Базовая LLM">
        <defs>
          <linearGradient id="g1Llm" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#c5daf0"/>
            <stop offset="100%" stop-color="#6fa0cf"/>
          </linearGradient>
          <marker id="m1" markerWidth="10" markerHeight="7" refX="9.5" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#2d5a8a"/>
          </marker>
        </defs>
        <!-- Стрелки по всей длине промежутка (~78px и ~76px) -->
        <path d="M 174 64 L 248 64" stroke="#cfe2f4" stroke-width="6" fill="none" stroke-linecap="round"/>
        <path d="M 174 64 L 248 64" stroke="#3d6fa8" stroke-width="2.4" fill="none" stroke-linecap="round" marker-end="url(#m1)"/>
        <path d="M 428 64 L 500 64" stroke="#cfe2f4" stroke-width="6" fill="none" stroke-linecap="round"/>
        <path d="M 428 64 L 500 64" stroke="#3d6fa8" stroke-width="2.4" fill="none" stroke-linecap="round" marker-end="url(#m1)"/>

        <rect x="32" y="38" width="142" height="52" rx="12" fill="#fff" stroke="var(--border)" stroke-width="1.2"/>
        <text x="103" y="62" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="600">Запрос</text>
        <text x="103" y="78" text-anchor="middle" fill="var(--muted)" font-size="10">контекст диалога</text>

        <rect x="254" y="32" width="174" height="62" rx="12" fill="url(#g1Llm)" stroke="#6b9bc4" stroke-width="1"/>
        <text x="341" y="62" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">LLM</text>
        <text x="341" y="80" text-anchor="middle" fill="rgba(255,255,255,0.92)" font-size="10">кассир</text>

        <rect x="504" y="38" width="142" height="52" rx="12" fill="#fff" stroke="var(--border)" stroke-width="1.2"/>
        <text x="575" y="70" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="600">Ответ</text>

        <g class="badges" fill="#fff" font-size="11" font-weight="700" font-family="Segoe UI, system-ui, sans-serif">
          <g transform="translate(103,14)"><circle r="13" fill="#e8943a" stroke="#fff" stroke-width="2.5"/><text x="0" y="0" text-anchor="middle" dominant-baseline="middle">1</text></g>
          <g transform="translate(341,14)"><circle r="13" fill="#e8943a" stroke="#fff" stroke-width="2.5"/><text x="0" y="0" text-anchor="middle" dominant-baseline="middle">2</text></g>
          <g transform="translate(575,14)"><circle r="13" fill="#e8943a" stroke="#fff" stroke-width="2.5"/><text x="0" y="0" text-anchor="middle" dominant-baseline="middle">3</text></g>
        </g>
      </svg>
    </div>
  </section>

        <rect x="608" y="48" width="120" height="46" rx="11" fill="#fff" stroke="var(--border)" stroke-width="1.2"/>

        <ellipse cx="498" cy="132" rx="44" ry="12" fill="#d4e6f7" stroke="var(--border)" stroke-width="1"/>

        <text x="498" y="156" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Vector DB</text>
        <text x="498" y="176" text-anchor="middle" fill="#f0f7ff" font-size="10" font-weight="600" opacity="0.95">Chroma</text>

        <rect x="454" y="228" width="88" height="18" rx="3" fill="#fff" stroke="var(--border)"/>
        <rect x="458" y="238" width="88" height="18" rx="3" fill="#fff" stroke="var(--border)"/>
        <rect x="462" y="248" width="88" height="22" rx="3" fill="#fff" stroke="var(--border)"/>
        <text x="498" y="288" text-anchor="middle" fill="var(--muted)" font-size="10">фрагменты меню</text>

        <rect x="168" y="328" width="160" height="52" rx="11" fill="#fff" stroke="var(--border)" stroke-width="1.2"/>
        <text x="248" y="350" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="600">Запрос + контексты</text>
        <text x="248" y="366" text-anchor="middle" fill="var(--muted)" font-size="9">промпт кассира</text>

        <rect x="402" y="322" width="140" height="64" rx="11" fill="url(#g2Llm)" stroke="#6b9bc4" stroke-width="1"/>

        </g>
      </svg>
    </div>
  </section>

          <linearGradient id="g3Llm" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#c5daf0"/>

          </marker>
        </defs>

        <g class="wires" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 668 94 C 668 118, 560 76, 380 82 C 260 86, 118 72, 118 88 L 118 124" stroke="#cfe2f4" stroke-width="6"/>
          <path d="M 668 94 C 668 118, 560 76, 380 82 C 260 86, 118 72, 118 88 L 118 124" stroke="#3d6fa8" stroke-width="2.3" marker-end="url(#m3)"/>
          <path d="M 188 148 L 218 148" stroke="#cfe2f4" stroke-width="6"/>

          <path d="M 418 160 L 454 160 L 454 218" stroke="#3d6fa8" stroke-width="2.3" marker-end="url(#m3)"/>

        <g class="badges" fill="#fff" font-size="11" font-weight="700" font-family="Segoe UI, system-ui, sans-serif">
          <g transform="translate(668,34)"><circle r="13" fill="#e8943a" stroke="#fff" stroke-width="2.5"/><text x="0" y="0" text-anchor="middle" dominant-baseline="middle">1</text></g>

  <!-- 4. Генерация диалогов и итерация (по фактическому потоку generate_dataset.py + simulate_dialog) -->
  <section class="panel">
    <div class="panel-body">
      <svg class="diagram" viewBox="0 0 700 404" xmlns="http://www.w3.org/2000/svg" aria-label="Генерация диалогов">
        <defs>
          <linearGradient id="g4Llm" x1="0%" y1="0%" x2="0%" y2="100%">

        </defs>

        <text x="350" y="16" text-anchor="middle" fill="var(--muted)" font-size="10" font-weight="600">Датасет и исследование (как в репозитории)</text>

        <g class="wires" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 350 86 L 350 102" stroke="#cfe2f4" stroke-width="6"/>
          <path d="M 350 86 L 350 102" stroke="#3d6fa8" stroke-width="2.2" marker-end="url(#m4)"/>

          <path d="M 350 170 L 378 170" stroke="#3d6fa8" stroke-width="2.2" marker-end="url(#m4)"/>
