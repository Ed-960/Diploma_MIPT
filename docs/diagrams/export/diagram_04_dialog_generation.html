<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Генерация диалогов и итерация</title>
  <style>
:root {
      --blue-soft: #c5daf0;
      --blue-mid: #8eb4d9;
      --blue-deep: #3d6fa8;
      --line: #3d6fa8;
      --line-glow: #a8c8e8;
      --line-dim: #7b9bc4;
      --blue-header: #e8f2fb;
      --white: #ffffff;
      --border: #9bb5d0;
      --text: #1a2d3d;
      --muted: #5a6f82;
      --accent: #e8943a;
      --shadow: 0 4px 18px rgba(61, 111, 168, 0.14);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 14px 12px 20px;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #fff;
      color: var(--text);
    }

    h1 {
      text-align: center;
      font-weight: 600;
      font-size: 1.32rem;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
      color: var(--blue-deep);
    }
    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 16px;
    }

    .panel {
      max-width: 920px;
      margin: 0 auto 14px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(61, 111, 168, 0.08);
      overflow: hidden;
    }

    .panel-body {
      padding: 6px 4px 10px;
      background: #fff;
    }

    .diagram {
      display: block;
      width: 100%;
      height: auto;
    }

    .diagram text {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      user-select: none;
    }

    @page { size: 297mm 172mm; margin: 3mm; }
    html, body {
      margin: 0 !important;
      padding: 0 !important;
      background: #fff !important;
      min-height: 0 !important;
      height: auto !important;
    }
    .panel {
      max-width: none !important;
      margin: 0 !important;
      border-radius: 6px;
      box-shadow: none !important;
      page-break-inside: avoid;
    }
    .panel-body {
      padding: 2px 0 4px !important;
      background: #fff !important;
    }
    .diagram { display: block; width: 100%; height: auto; }
    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
    
  </style>
</head>
<body>
<section class="panel">
    <div class="panel-body">
      <svg class="diagram" viewBox="0 0 700 404" xmlns="http://www.w3.org/2000/svg" aria-label="Генерация диалогов">
        <defs>
          <linearGradient id="g4Llm" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#c5daf0"/>
            <stop offset="100%" stop-color="#6fa0cf"/>
          </linearGradient>
          <linearGradient id="g4Mini" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#b8d4ec"/>
            <stop offset="100%" stop-color="#5d94c4"/>
          </linearGradient>
          <marker id="m4" markerWidth="10" markerHeight="7" refX="9.5" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#2d5a8a"/>
          </marker>
          <marker id="m4d" markerWidth="10" markerHeight="7" refX="9.5" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#6a8ab0"/>
          </marker>
        </defs>

        <text x="350" y="16" text-anchor="middle" fill="var(--muted)" font-size="10" font-weight="600">Датасет и исследование (как в репозитории)</text>

        <g class="wires" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 350 86 L 350 102" stroke="#cfe2f4" stroke-width="6"/>
          <path d="M 350 86 L 350 102" stroke="#3d6fa8" stroke-width="2.2" marker-end="url(#m4)"/>
          <path d="M 350 170 L 378 170" stroke="#cfe2f4" stroke-width="6"/>
          <path d="M 350 170 L 378 170" stroke="#3d6fa8" stroke-width="2.2" marker-end="url(#m4)"/>
          <path d="M 350 224 L 350 238" stroke="#cfe2f4" stroke-width="6"/>
          <path d="M 350 224 L 350 238" stroke="#3d6fa8" stroke-width="2.2" marker-end="url(#m4)"/>
          <path d="M 350 280 L 350 294" stroke="#cfe2f4" stroke-width="6"/>
          <path d="M 350 280 L 350 294" stroke="#3d6fa8" stroke-width="2.2" marker-end="url(#m4)"/>
          <path d="M 350 334 L 350 346" stroke="#cfe2f4" stroke-width="6"/>
          <path d="M 350 334 L 350 346" stroke="#3d6fa8" stroke-width="2.2" marker-end="url(#m4)"/>
        </g>

        <!-- 1: скрипт -->
        <rect x="50" y="36" width="600" height="50" rx="11" fill="#eef4fb" stroke="#9eb6d4" stroke-width="1.2"/>
        <text x="350" y="58" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="700">scripts/generate_dataset.py</text>
        <text x="350" y="76" text-anchor="middle" fill="var(--muted)" font-size="9">N задач: каждая вызывает simulate_dialog → save_dialog (пул потоков)</text>

        <!-- рамка «одна итерация датасета» -->
        <rect x="62" y="102" width="576" height="122" rx="12" fill="#f8fbfe" stroke="#7a9bc4" stroke-width="1.3" stroke-dasharray="7 5"/>
        <text x="350" y="120" text-anchor="middle" fill="#4a6a8a" font-size="9" font-weight="700">тело цикла по i = 1 … N (внутри скрипта)</text>

        <rect x="82" y="132" width="268" height="76" rx="10" fill="url(#g4Mini)" stroke="#5a8ab8" stroke-width="1"/>
        <text x="216" y="158" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">simulate_dialog</text>
        <text x="216" y="176" text-anchor="middle" fill="rgba(255,255,255,0.95)" font-size="9">mcd_voice.dialog — фасад DialogPipeline.run</text>
        <text x="216" y="192" text-anchor="middle" fill="rgba(255,255,255,0.88)" font-size="8">REG-профиль · ClientAgent / CashierAgent · validate_dialog → flags</text>

        <rect x="378" y="140" width="240" height="60" rx="10" fill="#fff" stroke="var(--border)" stroke-width="1.2"/>
        <text x="498" y="166" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="700">save_dialog</text>
        <text x="498" y="184" text-anchor="middle" fill="var(--muted)" font-size="9">mcd_voice.dialog — dialog_*.json в output_dir</text>

        <!-- после пакета -->
        <rect x="120" y="238" width="460" height="42" rx="10" fill="url(#g4Llm)" stroke="#6b9bc4" stroke-width="1"/>
        <text x="350" y="258" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">aggregate_stats(output_dir)</text>
        <text x="350" y="274" text-anchor="middle" fill="rgba(255,255,255,0.92)" font-size="9">summary.json по всем JSON в каталоге</text>

        <rect x="175" y="294" width="350" height="40" rx="10" fill="#eef4fb" stroke="#9eb6d4" stroke-width="1.2"/>
        <text x="350" y="318" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="700">scripts/compare_rag.py</text>

        <rect x="195" y="346" width="310" height="36" rx="10" fill="#fff" stroke="var(--border)" stroke-width="1.2"/>
        <text x="350" y="368" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="600">Правки</text>
        <text x="350" y="380" text-anchor="middle" fill="var(--muted)" font-size="8">промпты · RAG · модель — затем новый прогон датасета</text>

        <g class="wires-cycle" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 505 364 L 648 364 L 648 24 L 350 24 L 350 36" stroke="#dde8f4" stroke-width="6" stroke-dasharray="9 6"/>
          <path d="M 505 364 L 648 364 L 648 24 L 350 24 L 350 36" stroke="#5a7aa0" stroke-width="2.2" stroke-dasharray="9 6" marker-end="url(#m4d)"/>
        </g>

        <g class="badges" fill="#fff" font-size="11" font-weight="700" font-family="Segoe UI, system-ui, sans-serif">
          <g transform="translate(64,50)"><circle r="13" fill="#e8943a" stroke="#fff" stroke-width="2.5"/><text x="0" y="0" text-anchor="middle" dominant-baseline="middle">1</text></g>
          <g transform="translate(216,118)"><circle r="13" fill="#e8943a" stroke="#fff" stroke-width="2.5"/><text x="0" y="0" text-anchor="middle" dominant-baseline="middle">2</text></g>
          <g transform="translate(498,118)"><circle r="13" fill="#e8943a" stroke="#fff" stroke-width="2.5"/><text x="0" y="0" text-anchor="middle" dominant-baseline="middle">3</text></g>
          <g transform="translate(350,226)"><circle r="13" fill="#e8943a" stroke="#fff" stroke-width="2.5"/><text x="0" y="0" text-anchor="middle" dominant-baseline="middle">4</text></g>
          <g transform="translate(350,276)"><circle r="13" fill="#e8943a" stroke="#fff" stroke-width="2.5"/><text x="0" y="0" text-anchor="middle" dominant-baseline="middle">5</text></g>
          <g transform="translate(350,330)"><circle r="13" fill="#e8943a" stroke="#fff" stroke-width="2.5"/><text x="0" y="0" text-anchor="middle" dominant-baseline="middle">6</text></g>
        </g>

        <text x="350" y="398" text-anchor="middle" fill="var(--muted)" font-size="8">Светло-серый — scripts/ · градиент — mcd_voice.dialog</text>
      </svg>
    </div>
  </section>
</body>
</html>
