<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vector RAG + мини-LLM</title>
  <style>
:root {
      --blue-soft: #c5daf0;
      --blue-mid: #8eb4d9;
      --blue-deep: #3d6fa8;
      --line: #3d6fa8;
      --line-glow: #a8c8e8;
      --line-dim: #7b9bc4;
      --blue-header: #e8f2fb;
      --white: #ffffff;
      --border: #9bb5d0;
      --text: #1a2d3d;
      --muted: #5a6f82;
      --accent: #e8943a;
      --shadow: 0 4px 18px rgba(61, 111, 168, 0.14);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 14px 12px 20px;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #fff;
      color: var(--text);
    }

    h1 {
      text-align: center;
      font-weight: 600;
      font-size: 1.32rem;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
      color: var(--blue-deep);
    }
    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 16px;
    }

    .panel {
      max-width: 920px;
      margin: 0 auto 14px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(61, 111, 168, 0.08);
      overflow: hidden;
    }

    .panel-body {
      padding: 6px 4px 10px;
      background: #fff;
    }

    .diagram {
      display: block;
      width: 100%;
      height: auto;
    }

    .diagram text {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      user-select: none;
    }

    @page { size: 297mm 158mm; margin: 3mm; }
    html, body {
      margin: 0 !important;
      padding: 0 !important;
      background: #fff !important;
      min-height: 0 !important;
      height: auto !important;
    }
    .panel {
      max-width: none !important;
      margin: 0 !important;
      border-radius: 6px;
      box-shadow: none !important;
      page-break-inside: avoid;
    }
    .panel-body {
      padding: 2px 0 4px !important;
      background: #fff !important;
    }
    .diagram { display: block; width: 100%; height: auto; }
    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
    
  </style>
</head>
<body>
<section class="panel">
    <div class="panel-body">
      <svg class="diagram" viewBox="0 0 820 392" xmlns="http://www.w3.org/2000/svg" aria-label="Vector RAG">
        <defs>
          <linearGradient id="g2Llm" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#c5daf0"/>
            <stop offset="100%" stop-color="#6fa0cf"/>
          </linearGradient>
          <linearGradient id="g2Mini" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#b8d4ec"/>
            <stop offset="100%" stop-color="#5d94c4"/>
          </linearGradient>
          <linearGradient id="g2Emb" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#c5daf0"/>
            <stop offset="100%" stop-color="#7aa8cf"/>
          </linearGradient>
          <marker id="m2" markerWidth="10" markerHeight="7" refX="9.5" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#2d5a8a"/>
          </marker>
          <marker id="m2d" markerWidth="10" markerHeight="7" refX="9.5" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#6a8ab0"/>
          </marker>
        </defs>

        <!-- Линии (под фигурами): подложка + контур -->
        <g class="wires" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <!-- 1→2: дуга выше + длинный вертикальный спуск — стрелка сверху по нормали к мини-LLM -->
          <path d="M 668 94 C 668 118, 560 76, 380 82 C 260 86, 118 72, 118 88 L 118 124" stroke="#cfe2f4" stroke-width="6"/>
          <path d="M 668 94 C 668 118, 560 76, 380 82 C 260 86, 118 72, 118 88 L 118 124" stroke="#3d6fa8" stroke-width="2.3" marker-end="url(#m2)"/>
          <path d="M 188 148 L 218 148" stroke="#cfe2f4" stroke-width="6"/>
          <path d="M 188 148 L 218 148" stroke="#3d6fa8" stroke-width="2.3" marker-end="url(#m2)"/>
          <!-- 3→4: длиннее горизонталь до цилиндра (было ~30px) -->
          <path d="M 368 148 L 446 148" stroke="#cfe2f4" stroke-width="6"/>
          <path d="M 368 148 L 446 148" stroke="#3d6fa8" stroke-width="2.3" marker-end="url(#m2)"/>
          <path d="M 498 200 L 498 228" stroke="#cfe2f4" stroke-width="6"/>
          <path d="M 498 200 L 498 228" stroke="#3d6fa8" stroke-width="2.3" marker-end="url(#m2)"/>
          <path d="M 498 272 L 498 318 L 248 318 L 248 328" stroke="#cfe2f4" stroke-width="6"/>
          <path d="M 498 272 L 498 318 L 248 318 L 248 328" stroke="#3d6fa8" stroke-width="2.3" marker-end="url(#m2)"/>
          <path d="M 668 94 C 668 200, 668 260, 668 318 L 248 318 L 248 328" stroke="#dde8f4" stroke-width="5" stroke-dasharray="8 6"/>
          <path d="M 668 94 C 668 200, 668 260, 668 318 L 248 318 L 248 328" stroke="#6d8eb8" stroke-width="2" stroke-dasharray="8 6" marker-end="url(#m2d)"/>
          <!-- 6→7 / 7→8: увеличенные зазоры до LLM и до «Ответ» -->
          <path d="M 328 354 L 402 354" stroke="#cfe2f4" stroke-width="6"/>
          <path d="M 328 354 L 402 354" stroke="#3d6fa8" stroke-width="2.3" marker-end="url(#m2)"/>
          <path d="M 542 358 L 590 358" stroke="#cfe2f4" stroke-width="6"/>
          <path d="M 542 358 L 590 358" stroke="#3d6fa8" stroke-width="2.3" marker-end="url(#m2)"/>
        </g>

        <rect x="608" y="48" width="120" height="46" rx="11" fill="#fff" stroke="var(--border)" stroke-width="1.2"/>
        <text x="668" y="68" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="600">Запрос</text>
        <text x="668" y="84" text-anchor="middle" fill="var(--muted)" font-size="9">реплика клиента</text>

        <rect x="48" y="128" width="140" height="62" rx="11" fill="url(#g2Mini)" stroke="#5a8ab8" stroke-width="1"/>
        <text x="118" y="152" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Мини-LLM</text>
        <text x="118" y="168" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="9">rewrite для поиска</text>

        <path d="M 228 128 L 368 128 L 388 190 L 208 190 Z" fill="url(#g2Emb)" stroke="#6b9bc4" stroke-width="1"/>
        <text x="298" y="158" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Embedding</text>
        <text x="298" y="174" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="9">вектор запроса</text>

        <ellipse cx="498" cy="132" rx="44" ry="12" fill="#d4e6f7" stroke="var(--border)" stroke-width="1"/>
        <path d="M 454 132 L 454 186 L 542 186 L 542 132" fill="url(#g2Emb)" stroke="#6b9bc4" stroke-width="1"/>
        <ellipse cx="498" cy="186" rx="44" ry="12" fill="#5d8ab8" stroke="#4a7a9e" stroke-width="1"/>
        <text x="498" y="156" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Vector DB</text>
        <text x="498" y="176" text-anchor="middle" fill="#f0f7ff" font-size="10" font-weight="600" opacity="0.95">Chroma</text>

        <rect x="454" y="228" width="88" height="18" rx="3" fill="#fff" stroke="var(--border)"/>
        <rect x="458" y="238" width="88" height="18" rx="3" fill="#fff" stroke="var(--border)"/>
        <rect x="462" y="248" width="88" height="22" rx="3" fill="#fff" stroke="var(--border)"/>
        <text x="498" y="288" text-anchor="middle" fill="var(--muted)" font-size="10">фрагменты меню</text>

        <rect x="168" y="328" width="160" height="52" rx="11" fill="#fff" stroke="var(--border)" stroke-width="1.2"/>
        <text x="248" y="350" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="600">Запрос + контексты</text>
        <text x="248" y="366" text-anchor="middle" fill="var(--muted)" font-size="9">промпт кассира</text>

        <rect x="402" y="322" width="140" height="64" rx="11" fill="url(#g2Llm)" stroke="#6b9bc4" stroke-width="1"/>
        <text x="472" y="352" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">LLM</text>
        <text x="472" y="370" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="9">основная модель</text>

        <rect x="590" y="328" width="110" height="52" rx="11" fill="#fff" stroke="var(--border)" stroke-width="1.2"/>
        <text x="645" y="358" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="600">Ответ</text>

        <g class="badges" fill="#fff" font-size="11" font-weight="700" font-family="Segoe UI, system-ui, sans-serif">
          <g transform="translate(668,34)"><circle r="13" fill="#e8943a" stroke="#fff" stroke-width="2.5"/><text x="0" y="0" text-anchor="middle" dominant-baseline="middle">1</text></g>
          <g transform="translate(38,112)"><circle r="13" fill="#e8943a" stroke="#fff" stroke-width="2.5"/><text x="0" y="0" text-anchor="middle" dominant-baseline="middle">2</text></g>
          <g transform="translate(208,112)"><circle r="13" fill="#e8943a" stroke="#fff" stroke-width="2.5"/><text x="0" y="0" text-anchor="middle" dominant-baseline="middle">3</text></g>
          <g transform="translate(438,112)"><circle r="13" fill="#e8943a" stroke="#fff" stroke-width="2.5"/><text x="0" y="0" text-anchor="middle" dominant-baseline="middle">4</text></g>
          <g transform="translate(558,238)"><circle r="13" fill="#e8943a" stroke="#fff" stroke-width="2.5"/><text x="0" y="0" text-anchor="middle" dominant-baseline="middle">5</text></g>
          <g transform="translate(248,308)"><circle r="13" fill="#e8943a" stroke="#fff" stroke-width="2.5"/><text x="0" y="0" text-anchor="middle" dominant-baseline="middle">6</text></g>
          <g transform="translate(472,308)"><circle r="13" fill="#e8943a" stroke="#fff" stroke-width="2.5"/><text x="0" y="0" text-anchor="middle" dominant-baseline="middle">7</text></g>
          <g transform="translate(645,308)"><circle r="13" fill="#e8943a" stroke="#fff" stroke-width="2.5"/><text x="0" y="0" text-anchor="middle" dominant-baseline="middle">8</text></g>
        </g>
      </svg>
    </div>
  </section>
</body>
</html>
