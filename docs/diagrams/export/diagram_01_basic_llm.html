<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Базовая LLM (без RAG)</title>
  <style>
:root {
      --blue-soft: #c5daf0;
      --blue-mid: #8eb4d9;
      --blue-deep: #3d6fa8;
      --line: #3d6fa8;
      --line-glow: #a8c8e8;
      --line-dim: #7b9bc4;
      --blue-header: #e8f2fb;
      --white: #ffffff;
      --border: #9bb5d0;
      --text: #1a2d3d;
      --muted: #5a6f82;
      --accent: #e8943a;
      --shadow: 0 4px 18px rgba(61, 111, 168, 0.14);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 14px 12px 20px;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #fff;
      color: var(--text);
    }

    h1 {
      text-align: center;
      font-weight: 600;
      font-size: 1.32rem;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
      color: var(--blue-deep);
    }
    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 16px;
    }

    .panel {
      max-width: 920px;
      margin: 0 auto 14px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(61, 111, 168, 0.08);
      overflow: hidden;
    }

    .panel-body {
      padding: 6px 4px 10px;
      background: #fff;
    }

    .diagram {
      display: block;
      width: 100%;
      height: auto;
    }

    .diagram text {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      user-select: none;
    }

    @page { size: 297mm 78mm; margin: 2mm; }
    html, body {
      margin: 0 !important;
      padding: 0 !important;
      background: #fff !important;
      min-height: 0 !important;
      height: auto !important;
    }
    .panel {
      max-width: none !important;
      margin: 0 !important;
      border-radius: 6px;
      box-shadow: none !important;
      page-break-inside: avoid;
    }
    .panel-body {
      padding: 2px 0 4px !important;
      background: #fff !important;
    }
    .diagram { display: block; width: 100%; height: auto; }
    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
    
  </style>
</head>
<body>
<section class="panel">
    <div class="panel-body">
      <svg class="diagram" viewBox="0 0 676 128" xmlns="http://www.w3.org/2000/svg" aria-label="Базовая LLM">
        <defs>
          <linearGradient id="g1Llm" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#c5daf0"/>
            <stop offset="100%" stop-color="#6fa0cf"/>
          </linearGradient>
          <marker id="m1" markerWidth="10" markerHeight="7" refX="9.5" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#2d5a8a"/>
          </marker>
        </defs>
        <!-- Стрелки по всей длине промежутка (~78px и ~76px) -->
        <path d="M 174 64 L 248 64" stroke="#cfe2f4" stroke-width="6" fill="none" stroke-linecap="round"/>
        <path d="M 174 64 L 248 64" stroke="#3d6fa8" stroke-width="2.4" fill="none" stroke-linecap="round" marker-end="url(#m1)"/>
        <path d="M 428 64 L 500 64" stroke="#cfe2f4" stroke-width="6" fill="none" stroke-linecap="round"/>
        <path d="M 428 64 L 500 64" stroke="#3d6fa8" stroke-width="2.4" fill="none" stroke-linecap="round" marker-end="url(#m1)"/>

        <rect x="32" y="38" width="142" height="52" rx="12" fill="#fff" stroke="var(--border)" stroke-width="1.2"/>
        <text x="103" y="62" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="600">Запрос</text>
        <text x="103" y="78" text-anchor="middle" fill="var(--muted)" font-size="10">контекст диалога</text>

        <rect x="254" y="32" width="174" height="62" rx="12" fill="url(#g1Llm)" stroke="#6b9bc4" stroke-width="1"/>
        <text x="341" y="62" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">LLM</text>
        <text x="341" y="80" text-anchor="middle" fill="rgba(255,255,255,0.92)" font-size="10">кассир</text>

        <rect x="504" y="38" width="142" height="52" rx="12" fill="#fff" stroke="var(--border)" stroke-width="1.2"/>
        <text x="575" y="70" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="600">Ответ</text>

        <g class="badges" fill="#fff" font-size="11" font-weight="700" font-family="Segoe UI, system-ui, sans-serif">
          <g transform="translate(103,14)"><circle r="13" fill="#e8943a" stroke="#fff" stroke-width="2.5"/><text x="0" y="0" text-anchor="middle" dominant-baseline="middle">1</text></g>
          <g transform="translate(341,14)"><circle r="13" fill="#e8943a" stroke="#fff" stroke-width="2.5"/><text x="0" y="0" text-anchor="middle" dominant-baseline="middle">2</text></g>
          <g transform="translate(575,14)"><circle r="13" fill="#e8943a" stroke="#fff" stroke-width="2.5"/><text x="0" y="0" text-anchor="middle" dominant-baseline="middle">3</text></g>
        </g>
      </svg>
    </div>
  </section>
</body>
</html>
